{{- if .Values.secrets.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secrets.secretProviderClassName }}
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "{{ .Values.secrets.awsSecretName }}"
        objectType: "secretsmanager"
  # Optional: also sync into a native k8s Secret so it can be referenced
  # as envFrom/valueFrom instead of only a mounted file
  secretObjects:
    - secretName: demo-app-secret
      type: Opaque
      data:
        - objectName: "{{ .Values.secrets.awsSecretName }}"
          key: config.json
{{- end }}
